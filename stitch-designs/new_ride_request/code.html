<!-- Suppressed to prioritize the ride request task-focus -->
<script>
        // Countdown Timer Logic
        let timeLeft = 15;
        const timerText = document.getElementById('timer-text');
        const progressPath = document.getElementById('progress-path');
        const totalTime = 15;

        const countdown = setInterval(() => {
            timeLeft--;
            timerText.innerText = timeLeft;
            
            // Update circular progress
            const offset = (timeLeft / totalTime) * 100;
            progressPath.style.strokeDasharray = `${offset}, 100`;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                // Simple feedback for timeout
                document.querySelector('main').innerHTML = `
                    <div class="glass-panel p-xl rounded-3xl text-center animate-bounce">
                        <span class="material-symbols-outlined text-error text-[48px] mb-md">timer_off</span>
                        <h2 class="font-headline-md text-headline-md text-on-surface">Request Expired</h2>
                        <p class="text-on-surface-variant mt-2">Looking for new rides...</p>
                        <button onclick="location.reload()" class="mt-lg px-xl py-md bg-primary text-on-primary rounded-xl">BACK ONLINE</button>
                    </div>
                `;
            }
        }, 1000);

        // Interaction Feedback
        document.getElementById('accept-btn').addEventListener('click', function() {
            clearInterval(countdown);
            this.innerHTML = '<span class="flex items-center justify-center gap-2">CONNECTING...</span>';
            this.classList.add('animate-pulse');
            
            setTimeout(() => {
                alert('Ride Accepted! Navigating to Pickup.');
            }, 800);
        });

        // Micro-interaction for buttons
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('touchstart', () => btn.style.transform = 'scale(0.95)');
            btn.addEventListener('touchend', () => btn.style.transform = 'scale(1)');
        });
    </script>
