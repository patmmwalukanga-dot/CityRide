<script>
        // Micro-interaction: Move the car icon slightly
        document.addEventListener('DOMContentLoaded', () => {
            const car = document.getElementById('driver-car');
            let progress = 0;
            const animateMovement = () => {
                progress += 0.08;
                const startX = 15;
                const startY = 65;
                const endX = 25;
                const endY = 52;
                const currentX = startX + (endX - startX) * Math.sin(progress * 0.5);
                const currentY = startY + (endY - startY) * Math.sin(progress * 0.5);
                car.style.left = `${currentX}%`;
                car.style.top = `${currentY}%`;
                requestAnimationFrame(animateMovement);
            };
            setTimeout(animateMovement, 500);
        });
    </script>
