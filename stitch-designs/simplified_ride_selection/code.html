</div>

<script>
    function selectRide(type) {
        const cards = document.querySelectorAll('.ride-card');
        const btn = document.getElementById('requestBtn');
        
        cards.forEach(card => {
            card.classList.remove('bg-surface-container-low', 'border-primary');
            card.classList.add('bg-surface', 'border-transparent');
            card.querySelector('img').classList.add('opacity-60');
            card.querySelector('img').classList.remove('opacity-90');
        });

        const selectedCard = event.currentTarget;
        selectedCard.classList.remove('bg-surface', 'border-transparent');
        selectedCard.classList.add('bg-surface-container-low', 'border-primary');
        selectedCard.querySelector('img').classList.remove('opacity-60');
        selectedCard.querySelector('img').classList.add('opacity-90');

        btn.innerText = `Request ${type}`;
    }

    document.getElementById('requestBtn').addEventListener('click', function() {
        const overlay = document.getElementById('loadingOverlay');
        overlay.classList.remove('opacity-0', 'pointer-events-none');
        
        setTimeout(() => {
            overlay.classList.add('opacity-0', 'pointer-events-none');
            alert('Booking Confirmed!');
        }, 2000);
    });

    let startY;
    const sheet = document.getElementById('bottomSheet');
    sheet.addEventListener('touchstart', e => startY = e.touches[0].clientY);
    sheet.addEventListener('touchmove', e => {
        const diff = e.touches[0].clientY - startY;
        if (diff > 0) sheet.style.transform = `translateY(${diff}px)`;
    });
    sheet.addEventListener('touchend', () => sheet.style.transform = `translateY(0)`);
</script>
