<!-- MICRO-INTERACTIONS SCRIPT -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const arrivedBtn = document.getElementById('arrived-btn');
            
            arrivedBtn.addEventListener('click', () => {
                // Visual feedback for arrive action
                arrivedBtn.classList.remove('animate-pulse-soft');
                arrivedBtn.innerText = 'STARTING TRIP...';
                arrivedBtn.style.backgroundColor = '#10b981'; // Emerald Green success color
                
                setTimeout(() => {
                    arrivedBtn.innerText = 'TRIP STARTED';
                    // Here you would normally transition to the "In Progress" view
                }, 800);
            });

            // Simulate slight map movement for atmospheric effect
            const mapImg = document.querySelector('.map-container img');
            document.addEventListener('mousemove', (e) => {
                const x = (window.innerWidth / 2 - e.pageX) / 50;
                const y = (window.innerHeight / 2 - e.pageY) / 50;
                mapImg.style.transform = `scale(1.1) translate(${x}px, ${y}px)`;
            });
        });
    </script>
