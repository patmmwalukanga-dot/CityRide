<!-- Micro-interaction Script -->
<script>
        // Simple haptic-like feedback on major button click
        const offlineBtn = document.querySelector('button.bg-primary');
        offlineBtn.addEventListener('click', () => {
            offlineBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> GOING OFFLINE...';
            setTimeout(() => {
                window.location.reload(); // Simulate state change
            }, 1200);
        });

        // Add subtle parallax effect to map on device tilt (if supported) or mouse move
        const mapImg = document.querySelector('[data-location] img');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 100;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 100;
            mapImg.style.transform = `scale(1.05) translate(${xAxis}px, ${yAxis}px)`;
        });
    </script>
