                  "surface-variant": "#e2e2e2",
                  "error": "#ba1a1a",
                  "inverse-on-surface": "#f1f1f1",
                  "secondary": "#5d5e61",
                  "surface": "#f9f9f9",
                  "on-background": "#1b1b1b",
                  "on-secondary-container": "#616365",

                  "on-error": "#ffffff",

          },
          "borderRadius": {
                  "DEFAULT": "0.25rem",
                  "lg": "0.5rem",
                  "xl": "0.75rem",
                  "full": "9999px"

          "spacing": {
                  "margin-desktop": "40px",
                  "xs": "4px",
                  "gutter": "16px",
                  "margin-mobile": "20px",
                  "sm": "8px",
                  "unit": "4px",
                  "xl": "32px",
                  "md": "16px",
                  "lg": "24px"
          },
          "fontFamily": {
                  "headline-lg-mobile": ["Inter"],
                  "action-lg": ["Inter"],

                  "headline-md": ["Inter"],
                  "body-sm": ["Inter"],
                  "body-lg": ["Inter"],

          "fontSize": {
                  "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                  "action-lg": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                  "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],

                  "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],

                  "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}]

        },
      },

<style>
    body { font-family: 'Inter', sans-serif; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
    }
    .star-active { font-variation-settings: 'FILL' 1; color: #000000 !important; }
    .glass-effect {
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    body {
      min-height: 100dvh;
    }
  </style>
</head>
<body class="bg-background text-on-surface overflow-hidden flex flex-col items-center justify-center">
<!-- Background Map Layer (Dimmed) -->
<div class="fixed inset-0 z-0 brightness-50 contrast-75 grayscale-[20%] transition-all duration-700">
<div class="w-full h-full bg-cover bg-center" data-alt="A detailed aerial view of a clean, minimalist San Francisco city street at dusk." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuB2bZBO7zlFNIs3cbxOtX8lknngnIvk1iXAxTIM8OX29SD1_u0Xz2u8QKl0er_TQAGSDV3Mwb0zWgQFkiel7reJIsl3Kgq6ORRcdl3k2tyr24hNRaRY1C66n5CqTmXMZJC7LeahAjzZMWD42HI9lXtvVqgb5GMSW6L6ja9CnZ65XEbITDi-prYaFouDUhfu6acO0bvuy6KJJ_yYskkOK8tnsHlFH7Dvsuscf4b5f-xKP0EzkXKWHsqCXtItHgQzd8Mhsp8q4MS98KJj');"></div>
</div>
<!-- Shared TopAppBar -->
<nav class="fixed top-4 left-4 z-50 bg-surface/80 backdrop-blur-xl rounded-full shadow-lg flex items-center justify-center w-12 h-12 active:scale-95 transition-all cursor-pointer">
<span class="material-symbols-outlined text-on-surface">menu</span>
</nav>
<!-- Minimalist Rating Modal -->
<main class="relative z-[100] w-full max-w-sm px-margin-mobile">
<div class="bg-surface-container-lowest rounded-3xl shadow-2xl p-xl flex flex-col items-center text-center space-y-xl">
<!-- Checkmark -->
<div class="w-14 h-14 bg-primary rounded-full flex items-center justify-center shadow-md">
<span class="material-symbols-outlined text-on-primary text-[28px]" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<!-- Fare -->
<div class="space-y-xs">
<p class="font-label-md text-label-md text-secondary uppercase tracking-[0.2em]">Final Fare</p>
<p class="font-headline-lg text-[40px] leading-tight text-primary">ZK 14.50</p>
</div>
<!-- Stars -->
<div class="space-y-lg w-full">
<p class="font-body-lg text-on-surface-variant">Rate your trip with Alex</p>
<div class="flex justify-center gap-md" id="star-rating">
<button class="star-btn transition-transform active:scale-90" data-index="1">
<span class="material-symbols-outlined text-[36px] text-surface-container-highest transition-colors cursor-pointer">star</span>
</button>
<button class="star-btn transition-transform active:scale-90" data-index="2">
<span class="material-symbols-outlined text-[36px] text-surface-container-highest transition-colors cursor-pointer">star</span>
</button>
<button class="star-btn transition-transform active:scale-90" data-index="3">
<span class="material-symbols-outlined text-[36px] text-surface-container-highest transition-colors cursor-pointer">star</span>
</button>
<button class="star-btn transition-transform active:scale-90" data-index="4">
<span class="material-symbols-outlined text-[36px] text-surface-container-highest transition-colors cursor-pointer">star</span>
</button>
<button class="star-btn transition-transform active:scale-90" data-index="5">
<span class="material-symbols-outlined text-[36px] text-surface-container-highest transition-colors cursor-pointer">star</span>
</button>
</div>
</div>
<!-- Minimal Done Button -->
<button class="w-full bg-primary text-on-primary py-4 rounded-2xl font-action-lg text-action-lg hover:opacity-90 active:scale-[0.98] transition-all">
        Done
      </button>
</div>
</main>
<!-- Atmosphere -->
<div class="fixed inset-0 pointer-events-none z-10 flex items-center justify-center">
<div class="w-[400px] h-[400px] bg-primary/5 rounded-full blur-[120px] animate-pulse"></div>
</div>
<script>
    // Rating Interaction
    const stars = document.querySelectorAll('.star-btn');
    stars.forEach((btn, idx) => {
      btn.addEventListener('click', () => {
        const index = parseInt(btn.getAttribute('data-index'));
        stars.forEach((s, i) => {
          const icon = s.querySelector('.material-symbols-outlined');
          if (i < index) {
            icon.classList.add('star-active');
            icon.style.fontVariationSettings = "'FILL' 1";
          } else {
            icon.classList.remove('star-active');
            icon.style.fontVariationSettings = "'FILL' 0";
          }
        });
      });
    });
  </script>


</body></html>
