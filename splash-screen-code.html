<style>

</div>
<script>
        // Simple entry interaction for elements
        document.addEventListener('DOMContentLoaded', () => {
            console.log('CityRide Premium Splash Initialized');
            
            // Interaction: Subtle parallax on mouse move (Desktop)
            if (window.innerWidth > 768) {
                document.addEventListener('mousemove', (e) => {
                    const x = (e.clientX - window.innerWidth / 2) / 80;
                    const y = (e.clientY - window.innerHeight / 2) / 80;
                    const branding = document.querySelector('main');
                    if (branding) branding.style.transform = `translate(${x}px, ${y}px)`;
                });
            }
        });
    </script>
